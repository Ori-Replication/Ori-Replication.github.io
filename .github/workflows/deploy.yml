name: Deploy Next.js and Quartz to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-nextjs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nextjs_profolio
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: './nextjs_profolio/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Build with Next.js
        run: npm run build
      - name: Upload Next.js artifact
        uses: actions/upload-artifact@v3
        with:
          name: nextjs-build
          path: ./nextjs_profolio/out

  build-quartz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Quartz Dependencies
        run: npm ci
        working-directory: ./quartz
      - name: Build Quartz
        run: npx quartz build
        working-directory: ./quartz
      - name: Upload Quartz artifact
        uses: actions/upload-artifact@v3
        with:
          name: quartz-build
          path: ./quartz/public

  combine-and-deploy:
    needs: [build-nextjs, build-quartz]
    runs-on: ubuntu-latest
    steps:
      - name: Download Next.js artifact
        uses: actions/download-artifact@v3
        with:
          name: nextjs-build
          path: ./combined
      - name: Download Quartz artifact
        uses: actions/download-artifact@v3
        with:
          name: quartz-build
          path: ./combined/blog
      - name: Upload combined artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./combined
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}